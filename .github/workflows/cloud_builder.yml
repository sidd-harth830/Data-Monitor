name: Cloud Builder & SHA-1 Extractor

on:
  workflow_dispatch:

jobs:
  build_and_extract:
    name: Extract Keys and Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Global Gradle Compiler
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 🔑 EXTRACT SHA-1 KEY FOR FIREBASE
        run: |
          # Find the Android project folder
          ROOT_DIR=$(find . -maxdepth 3 -name "settings.gradle*" -type f | head -n 1)
          ROOT_DIR=$(dirname "$ROOT_DIR")
          cd "$ROOT_DIR"
          
          echo "Generating cryptographic report..."
          gradle signingReport > keys.txt
          
          echo "================================================="
          echo "📋 COPY THIS SHA-1 KEY INTO FIREBASE:"
          grep "SHA1" keys.txt | head -n 1
          echo "================================================="

      - name: 🚀 Compile Test APK
        run: |
          ROOT_DIR=$(find . -maxdepth 3 -name "settings.gradle*" -type f | head -n 1)
          ROOT_DIR=$(dirname "$ROOT_DIR")
          cd "$ROOT_DIR"
          
          # We build a Debug APK here because Release APKs require passwords we don't have in the cloud yet
          gradle assembleDebug

      - name: 📦 Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: test-ready-apk
          path: '**/app/build/outputs/apk/**/*.apk'
