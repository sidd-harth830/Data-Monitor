name: Cloud Builder CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK and Extract Keys
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Gradle (v8.7)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Prepare Environment File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=dummy_key" > .env
          fi

      - name: Forcefully Generate Debug Keystore
        run: |
          rm -f ./debug.keystore
          keytool -genkey -v -keystore ./debug.keystore -storepass android -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Auto-Detect and Sanitize Gradle Wrapper
        run: |
          echo "Locating gradlew script..."
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/.*" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "::error::Gradle Wrapper (gradlew) is missing from the repository structure!"
            exit 1
          fi
          echo "Found gradlew at: $GRADLEW_PATH"
          sed -i 's/\r$//' "$GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          echo "GRADLEW_PATH=$GRADLEW_PATH" >> $GITHUB_ENV

      - name: Extract Firebase Cryptographic Keys
        run: |
          echo "Running gradle signingReport..."
          ${{ env.GRADLEW_PATH }} signingReport > signing_report.txt
          cat signing_report.txt
          echo "=================== EXTRACTED KEYS FOR FIREBASE ==================="
          grep -E "SHA1:|SHA-256:" signing_report.txt || true
          echo "=================================================================="

      - name: Compile App Binary (APK)
        run: |
          ${{ env.GRADLEW_PATH }} assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
