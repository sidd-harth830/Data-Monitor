name: SHA Extractor and APK Builder

on:
  workflow_dispatch:

jobs:
  build_and_extract:
    name: Build & Extract Keys
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Global Gradle Compiler
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 🛠️ Generate Missing Debug Keystore
        run: |
          ROOT_DIR=$(find . -maxdepth 3 -name "settings.gradle*" -type f | head -n 1)
          ROOT_DIR=$(dirname "$ROOT_DIR")
          cd "$ROOT_DIR"
          
          echo "Generating a new debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Keystore successfully created!"

      - name: 🔑 EXTRACT SHA-1 AND SHA-256 KEYS
        run: |
          ROOT_DIR=$(find . -maxdepth 3 -name "settings.gradle*" -type f | head -n 1)
          ROOT_DIR=$(dirname "$ROOT_DIR")
          cd "$ROOT_DIR"
          
          gradle signingReport > keys.txt
          
          echo "================================================="
          echo "📋 COPY THESE KEYS INTO FIREBASE:"
          echo "================================================="
          grep "SHA1: " keys.txt | head -n 1
          grep "SHA-256: " keys.txt | head -n 1
          echo "================================================="

      - name: 🚀 Compile Test APK
        run: |
          ROOT_DIR=$(find . -maxdepth 3 -name "settings.gradle*" -type f | head -n 1)
          ROOT_DIR=$(dirname "$ROOT_DIR")
          cd "$ROOT_DIR"
          
          gradle assembleDebug

      - name: 📦 Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: test-ready-apk
          path: '**/app/build/outputs/apk/**/*.apk'