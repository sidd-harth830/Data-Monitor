name: Public Production Rollout (Live Release)

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version Name (e.g., 3.5.2)'
        required: true
        default: '3.5.2'
      runId:
        description: 'Source Github Actions Run ID'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish_live:
    name: Promoted Release Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create public releases and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Staged APK from Private Repository
        uses: actions/download-artifact@v4
        with:
          name: staged-apk
          path: extracted_apk
          github-token: ${{ secrets.PRIVATE_REPO_READ_TOKEN }}
          repository: 'sid-yadav7307/Data-Monitor-Private'
          run-id: ${{ github.event.inputs.runId }}

      - name: Locate and Promote Production APK
        run: |
          echo "Searching for compiled staging binaries in download directory..."
          APK_PATH=$(find extracted_apk/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "::error::Staged APK was not found in the downloaded artifact package!"
            exit 1
          fi
          echo "Located staged APK at: $APK_PATH"
          mv "$APK_PATH" ./app-release-live.apk

      - name: Create Production Release on Public Repository
        uses: softprops/action-gh-release@v2
        with:
          name: App Release v${{ github.event.inputs.versionName }}
          tag_name: v${{ github.event.inputs.versionName }}
          files: app-release-live.apk
          draft: false
          prerelease: false
          body: |
            ## Modern Data Usage Monitor (v${{ github.event.inputs.versionName }}) - Production Build
            - Dual-Repository automated compiler pipeline promotion.
            - This release has been officially reviewed, sanctioned, and broadcasted via the Admin Approval Gate.
            - Safe, compiled, and unmetered client update delivery target.
