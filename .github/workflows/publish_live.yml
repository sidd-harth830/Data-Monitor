name: Public Production Rollout (Live Release)

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version Name (e.g., 3.5.2)'
        required: true
        default: '3.5.2'
      runId:
        description: 'Source Github Actions Run ID'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  publish_live:
    name: Promoted Release Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Staged APK from Private Repository
        uses: actions/download-artifact@v4
        with:
          name: staged-apk
          repository: sid-yadav7307/Data-Monitor-Private
          run-id: ${{ github.event.inputs.runId }}
          github-token: ${{ secrets.PRIVATE_REPO_READ_TOKEN }}
          path: extracted_app/

      - name: Create Production Release on Public Repository
        uses: softprops/action-gh-release@v2
        with:
          name: App Release v${{ github.event.inputs.versionName }}
          tag_name: v${{ github.event.inputs.versionName }}
          files: extracted_app/**/*.apk
          draft: false
          prerelease: false
