name: Auto Build & Dual-Repo Release (Hybrid Pipeline)

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_deploy_release:
    name: Build APK and Push to Public Release Repo
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Private Source Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Secure Application Binary
        run: ./gradlew assembleDebug

      - name: Broadcast Release Assets to Public Repository
        uses: softprops/action-gh-release@v1
        with:
          repository: sidd-harth830/Data-Monitor-Releases # Update this to your public release repository!
          token: ${{ secrets.RELEASE_REPO_PAT }} # Secure Personal Access Token from GitHub Secrets
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Automated Production Compilation (v3.4.0)
            - Secure dual-repository compilation complete.
            - Static binary compiled from source-closed repository environment.
            - SHA-256 Checksum tracking enabled for consumer integrity validation.
