name: Secure Staging Build (Private Compiler)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_staging:
    name: Compile and Stage Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Secure Application Binary (STAGING)
        run: ./gradlew assembleDebug

      # Upload APK as a GitHub Actions Artifact named 'staged-apk'
      - name: Upload Compiled Binary Artifact
        uses: actions/upload-artifact@v3
        with:
          name: staged-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Setup Firebase Tools CLI to write staging metadata record securely to Firestore 'app_config/staging_update'
      - name: Document Pending Staging Release on Firestore
        run: |
          npm install -g firebase-tools
          
          VERSION_NAME="3.5.1"
          VERSION_CODE=50
          RUN_ID="${{ github.run_id }}"
          STATUS="PENDING_REVIEW"
          TIMESTAMP=$(date +%s)
          
          # Writing directly to Firestore using Firebase CLI
          firebase firestore:documents:set "app_config/staging_update" "{\"versionCode\": $VERSION_CODE, \"versionName\": \"$VERSION_NAME\", \"runId\": \"$RUN_ID\", \"status\": \"$STATUS\", \"timestamp\": {\"seconds\": $TIMESTAMP}}" --token "${{ secrets.FIREBASE_TOKEN }}"
