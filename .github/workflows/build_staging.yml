name: Secure Staging Build (Private Compiler)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_staging:
    name: Compile and Stage Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # CRITICAL FIX: Installs the compiler directly on the GitHub server.
      # This means we no longer care if the 'gradlew' file is missing!
      - name: Install Global Gradle Compiler
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Cloud-Compile APK
        run: |
          echo "🔍 Searching for your Android project root..."
          
          # Looks for the core settings file instead of the wrapper
          ROOT_DIR=$(find . -maxdepth 3 -name "settings.gradle*" -type f | head -n 1)
          
          if [ -z "$ROOT_DIR" ]; then
            echo "::error::CRITICAL FAILURE: 'settings.gradle' is missing. Please ensure your AI Studio project exported correctly."
            exit 1
          fi
          
          ROOT_DIR=$(dirname "$ROOT_DIR")
          echo "✅ Found Android project inside: $ROOT_DIR"
          cd "$ROOT_DIR"
          
          echo "🚀 Compiling the App..."
          # Uses the global 'gradle' tool we just installed instead of './gradlew'
          gradle assembleDebug --stacktrace

      - name: Upload Compiled Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: staged-apk
          path: '**/app/build/outputs/apk/debug/*.apk'
          if-no-files-found: error
