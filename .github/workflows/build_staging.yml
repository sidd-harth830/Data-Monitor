name: Secure Staging Build (Private Compiler)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_staging:
    name: Compile and Stage Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Auto-Detect and Sanitize Gradle Wrapper
        run: |
          echo "Locating gradlew script..."
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/.*" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "::error::Gradle Wrapper (gradlew) is missing from the repository structure!"
            exit 1
          fi
          echo "Found gradlew at: $GRADLEW_PATH"
          sed -i 's/\r$//' "$GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          echo "GRADLEW_PATH=$GRADLEW_PATH" >> $GITHUB_ENV

      - name: Build Secure Application Binary (STAGING)
        run: |
          ${{ env.GRADLEW_PATH }} assembleDebug --stacktrace

      # Upload APK as a GitHub Actions Artifact named 'staged-apk'
      - name: Upload Compiled Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: staged-apk
          path: "**/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error

      # Setup Firebase Tools CLI to write staging metadata record
      - name: Document Pending Staging Release on Firestore
        run: |
          npm install -g firebase-tools
          
          VERSION_NAME="3.5.2"
          VERSION_CODE=52
          RUN_ID="${{ github.run_id }}"
          STATUS="PENDING_REVIEW"
          TIMESTAMP=$(date +%s)
          
          firebase firestore:documents:set "app_config/staging_update" "{\"versionCode\": $VERSION_CODE, \"versionName\": \"$VERSION_NAME\", \"runId\": \"$RUN_ID\", \"status\": \"$STATUS\", \"timestamp\": {\"seconds\": $TIMESTAMP}}" --token "${{ secrets.FIREBASE_TOKEN }}"
