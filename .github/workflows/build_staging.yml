name: Secure Staging Build (Private Compiler)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_staging:
    name: Compile and Stage Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      # CRITICAL FIX: Strips hidden Windows formatting that causes Exit Code 1
      - name: Fix Windows Line Endings in Gradle
        run: sed -i 's/\r$//' gradlew

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Secure Application Binary
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Compiled Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: staged-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
